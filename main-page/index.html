<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Creator Hub</title>

    <!-- FAVICON + APPLE TOUCH ICON -->
    <link rel="icon" type="image/png" href="../assets/IMG_4012.png">
    <link rel="apple-touch-icon" href="../assets/IMG_4012.png">

    <style>
        /* HEADER FONT */
        @font-face {
            font-family: "PixelDigivolve";
            src: url("../assets/fonts/Pixel Digivolve.otf") format("opentype");
        }

        /* BODY FONT */
        @font-face {
            font-family: "Minecraftia";
            src: url("../assets/fonts/Minecraftia-Regular.ttf") format("truetype");
        }

        /* DEFAULT TEXT FONT */
        body, p, a, li, div, span {
            font-family: "Minecraftia", sans-serif;
        }

        /* TEXT‑ONLY SHIFT FIX (your 6px version) */
        .minecraftia-text-fix {
            display: inline-block;
            transform: translateY(6px);
        }

        body {
            margin: 0;
            background: #f0f0f0;
            text-align: center;
        }

        /* BLUE BANNER — DARKER + BORDERS */
        .banner {
            background: #1f4fd1; /* darker blue */
            color: white;
            padding: 60px 20px;
            position: relative;
            margin-top: 40px;

            border-top: 3px solid #0f2a7a;
            border-bottom: 3px solid #0f2a7a;
        }

        /* HEADER TEXT */
        .banner h1 {
            font-family: "PixelDigivolve", monospace;
            font-size: 48px;
            font-weight: normal;
            letter-spacing: 2px;
            text-shadow: 2px 2px #000;
        }

        /* BADGES */
        .badge {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #3b82f6;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            border: 2px solid #1e40af;

            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        .badge.top {
            top: -20px;
        }

        .badge.bottom {
            bottom: -20px;
        }

        /* MINECRAFT‑STYLE DISCLAIMER BUTTON */
        .disclaimer-box {
            background: #ef4444;                 /* base red */
            color: white;
            padding: 15px;
            margin: 60px auto;
            width: 80%;
            max-width: 600px;
            cursor: pointer;
            font-weight: bold;
            user-select: none;

            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.3;

            border: 4px solid #7f1d1d;          /* dark red border */
            box-shadow: 0 6px 0 #5c0f0f;        /* pixel bottom edge */
            border-radius: 0;                   /* Minecraft-style square edges */

            transition:
                background 0.1s ease-out,
                transform 0.1s ease-out,
                box-shadow 0.1s ease-out;
        }

        /* CLICK (PRESS) EFFECT — NO HOVER */
        .disclaimer-box:active {
            background: #b82f2f;                /* darker red when pressed */
            transform: translateY(3px) scale(0.97);
            box-shadow: 0 3px 0 #5c0f0f;        /* shorter shadow */
        }

        .disclaimer-content {
            display: none;
            background: #fee2e2;
            color: #7f1d1d;
            padding: 15px;
            margin: 10px auto;
            width: 80%;
            max-width: 600px;
            border-radius: 8px;
            border: 2px solid #ef4444;
            user-select: none;
        }
    </style>
</head>

<body>

    <!-- BLUE BANNER -->
    <div class="banner">
        <div class="badge top">
            <span class="minecraftia-text-fix">MCCH <span id="year-top"></span></span>
        </div>

        <h1>Minecraft Creator Hub</h1>

        <div class="badge bottom">
            <span class="minecraftia-text-fix">MCCH <span id="year-bottom"></span></span>
        </div>
    </div>

    <!-- DISCLAIMER -->
    <div class="disclaimer-box" onclick="toggleDisclaimer()">
        <span style="user-select: none;" class="minecraftia-text-fix">Disclaimer (click to open)</span>
    </div>

    <div class="disclaimer-content" id="disclaimer">
        <span class="minecraftia-text-fix">
            This website is not affiliated with Mojang or Microsoft.<br>
            All Minecraft assets belong to their respective owners.<br>
            This is a fan‑made project for community use.
        </span>
    </div>

    <script>
        // Mobile click checker
        document.addEventListener("touchstart", function(){}, true);
        
        // Auto-update year
        const year = new Date().getFullYear();
        document.getElementById("year-top").textContent = year;
        document.getElementById("year-bottom").textContent = year;

        // Toggle disclaimer
        function toggleDisclaimer() {
            const box = document.getElementById("disclaimer");
            box.style.display = box.style.display === "block" ? "none" : "block";
        }
    </script>

</body>
</html>
